name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      
      - name: Lint
        run: |
          ruff check . --output-format=github
        continue-on-error: true
      
      - name: Type check
        run: |
          mypy . --ignore-missing-imports || true
        continue-on-error: true
      
      - name: Tests
        run: |
          pytest -v --tb=short || true

  test-cross-platform:
    runs-on: [ubuntu-latest, windows-latest]
    strategy:
      matrix:
        python: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      
      - name: Install
        run: |
          pip install -e .
      
      - name: Import test
        run: |
          python -c "from orchestrator import SiriBot; print('OK')"
      
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: bandit
        uses: pybandit/bandit-action@v1
        with:
          exit_zero: true